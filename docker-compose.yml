version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: motion_compare_db
    environment:
      POSTGRES_DB: motion_compare_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ikram
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application
  app:
    build: .
    container_name: motion_compare_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: motion_compare_db
      DB_USER: postgres
      DB_PASSWORD: ikram
      SMPLX_MODEL_PATH: /app/models/smplx
      DEBUG: "True"
    volumes:
      - ./train:/app/train:ro
      - ./models:/app/models:ro
      - ./uploads:/app/uploads
      - ./temp:/app/temp
    ports:
      - "8000:8000"
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Loading training data...' &&
        python scripts/load_training_data.py &&
        echo 'Starting application...' &&
        python main.py
      "

volumes:
  postgres_data:
