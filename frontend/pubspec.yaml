name: motion_comparison_app
description: 3D Human Motion Comparison System - Multi-platform Flutter app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.6
  go_router: ^13.0.0
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Network & API
  dio: ^5.4.0
  retrofit: ^4.0.3
  
  # SVG Support
  flutter_svg: ^2.0.9
  json_annotation: ^4.8.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # 3D Visualization (temporarily disabled)
  # flutter_gl: ^0.0.22
  vector_math: ^2.1.4
  
  # Video
  video_player: ^2.8.2
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  
  # Utils
  intl: ^0.18.1
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  retrofit_generator: ^8.0.4
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
